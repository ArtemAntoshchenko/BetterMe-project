# ======================
# Nginx конфигурация BetterMe
# ======================
# Версия: 1.0
# Дата: 2026
# Описание: Reverse proxy + статика + gzip + балансировка
# =====================

# Группа бэкендов для балансировки нагрузки
upstream betterme_backend {
    least_conn; 
    server 127.0.0.1:9011;  
    # server 127.0.0.1:9012;  
}

server {
    listen       8080;  
    server_name  localhost;
    
    # ========== ЛОГИРОВАНИЕ ==========
    access_log  logs/betterme_access.log detailed;
    error_log   logs/betterme_error.log warn;
    
    # ========== СТАТИКА ==========
    location /static/ {
        alias C:/Users/User/Desktop/BetterMe/frontEnd/static/;

        location ~* \.(css|js)$ {
            expires 30d;
            add_header Cache-Control 'public, immutable';
        }

        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        access_log logs/static_access.log static;
    }

    # ========== API ПРОКСИ ==========
    location = /test/ {
        return 200 'Этот ответ пришел напрямую от Nginx!';
        add_header Content-Type "text/plain; charset=utf-8";
    }

    location ~ \.php$ {          
    return 200 "Regex match";
    }

    location /debug/ {
        return 200 "
            Request URI: $request_uri
            Host: $host
            Remote IP: $remote_addr
            Time: $time_local
            Scheme: $scheme
            Server Name: $server_name
            Server Port: $server_port
            Cookie: $http_cookie
        ";
        add_header Content-Type 'text/plain';
    }

    location / {
        proxy_pass http://127.0.0.1:9012;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering off;
    }

    # ========== СЖАТИЕ ==========
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript 
    #              application/javascript application/json 
    #              application/xml application/rss+xml image/svg+xml;

    gzip  on;
    gzip_comp_level 5;
    gzip_min_length 20;
    gzip_proxied any;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        application/x-font-ttf;
    gzip_disable "msie6";
    gzip_vary on;
}